services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Baked into the SPA build — change and rebuild to point at a different API
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/v1}
    image: flowdesk-frontend:latest
    container_name: flowdesk-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    restart: unless-stopped